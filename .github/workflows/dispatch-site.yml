name: Notify site to rebuild

# When the data or generator changes on main, ask the unb-sat.github.io repo to
# rebuild immediately (its build.yml listens for repository_dispatch type "rebuild").
#
# Requires a secret SITE_DISPATCH_TOKEN: a token with permission to send a
# repository_dispatch to UnB-SAT/unb-sat.github.io. A fine-grained PAT scoped to that
# repo with "Contents: read and write" works, as does a classic PAT with "public_repo".
# Without the secret this job no-ops, the site still rebuilds on its daily schedule.

on:
  push:
    branches: [main]
    paths:
      - data/students.yml
      - scripts/build_profile.py

permissions: {}

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch
        env:
          TOKEN: ${{ secrets.SITE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "SITE_DISPATCH_TOKEN not set; skipping. The site rebuilds on its daily schedule."
            exit 0
          fi
          code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/UnB-SAT/unb-sat.github.io/dispatches \
            -d '{"event_type":"rebuild"}')
          echo "Dispatch HTTP status: $code"
          [ "$code" = "204" ]
